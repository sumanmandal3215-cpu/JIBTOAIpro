<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIBTO AI - OFFICIAL MASTER</title>
    <style>
        :root { --gold: #d4af37; --sky: #00d4ff; --dark: #010108; }
        body { background-color: var(--dark); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; overflow: hidden; }
        
        /* লগইন স্ক্রিন */
        #login-screen { background: rgba(5, 5, 15, 0.98); padding: 30px; border-radius: 20px; width: 310px; border: 1.5px solid var(--gold); text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 10px; box-shadow: 0 0 15px var(--gold); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: #fff; box-sizing: border-box; font-size: 14px; }
        .login-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: linear-gradient(45deg, var(--gold), #f1c40f); color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; box-shadow: 0 4px 15px rgba(212,175,55,0.4); }

        /* মেইন অ্যাপ */
        #main-app { display: none; text-align: center; width: 350px; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .ai-card { background: rgba(10, 10, 25, 0.95); border-radius: 30px; padding: 20px; border: 2.5px solid var(--sky); box-shadow: 0 0 40px rgba(0, 212, 255, 0.3); }
        .ai-orb { width: 110px; height: 110px; border-radius: 50%; background: radial-gradient(circle, var(--sky), #007791, #000); margin: 10px auto; box-shadow: 0 0 35px var(--sky); animation: pulse 2s infinite ease-in-out; cursor: pointer; border: 3px solid rgba(255,255,255,0.2); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        #signal-text { font-size: 24px; font-weight: bold; margin: 12px 0; min-height: 40px; text-transform: uppercase; }
        .up { color: #00ff88; text-shadow: 0 0 20px #00ff88; }
        .down { color: #ff3e3e; text-shadow: 0 0 20px #ff3e3e; }

        /* ৫টি টাইমার বাটন */
        .timer-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
        .timer-btn { background: #000; border: 1.5px solid var(--sky); color: var(--sky); padding: 10px 0; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .timer-btn.active { background: var(--sky); color: #000; box-shadow: 0 0 15px var(--sky); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .action-btn { background: rgba(0, 212, 255, 0.05); border: 1.5px solid var(--sky); color: var(--sky); padding: 10px; border-radius: 10px; font-size: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <img src="1000008884.jpg" class="logo" alt="Logo">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:10px; font-size: 20px; letter-spacing: 1px;">JIBTO AI SYSTEM</div>
        <input type="text" id="uname" placeholder="আপনার নাম লিখুন">
        <input type="number" id="trader-id" placeholder="ট্রেডার আইডি">
        <input type="password" id="pass" placeholder="পাসওয়ার্ড">
        <select id="lang-select">
            <option value="bn-BD">ভাষা: বাংলা (Bengali)</option>
            <option value="en-US">Language: English</option>
        </select>
        <button class="login-btn" onclick="startApp()">LOGIN & ACTIVATE AI</button>
    </div>

    <div id="main-app">
        <div style="color:var(--gold); font-weight:bold; margin-bottom:8px; font-size: 11px; letter-spacing: 2px;">SUMON STRATEGY - JIBTO AI PRO</div>
        <div class="ai-card">
            <div class="ai-orb" onclick="askJibto()"></div>
            <div id="m-display" style="color:#888; font-size:10px;">Market: Ready for Scan</div>
            <div id="signal-text">SYSTEM SECURED</div>

            <select id="market-select" onchange="marketUpdate()">
                <option value="">--- ২০টি ওটিসি মার্কেট বেছে নিন ---</option>
                <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
                <option value="GBP/USD (OTC)">GBP/USD (OTC)</option>
                <option value="USD/JPY (OTC)">USD/JPY (OTC)</option>
                <option value="AUD/CAD (OTC)">AUD/CAD (OTC)</option>
                <option value="USD/BRL (OTC)">USD/BRL (OTC)</option>
                <option value="GOLD (OTC)">GOLD (OTC)</option>
                <option value="CRYPTO IDX">CRYPTO IDX</option>
                <option value="BITCOIN">BITCOIN</option>
                <option value="EUR/GBP (OTC)">EUR/GBP (OTC)</option>
                <option value="USD/CHF (OTC)">USD/CHF (OTC)</option>
                <option value="AUD/USD (OTC)">AUD/USD (OTC)</option>
                <option value="EUR/JPY (OTC)">EUR/JPY (OTC)</option>
                <option value="NZD/USD (OTC)">NZD/USD (OTC)</option>
                <option value="CAD/JPY (OTC)">CAD/JPY (OTC)</option>
                <option value="APPLE (OTC)">APPLE (OTC)</option>
                <option value="INTEL (OTC)">INTEL (OTC)</option>
                <option value="FACEBOOK (OTC)">FACEBOOK (OTC)</option>
                <option value="MICROSOFT (OTC)">MICROSOFT (OTC)</option>
                <option value="BOEING (OTC)">BOEING (OTC)</option>
                <option value="ETHEREUM">ETHEREUM</option>
            </select>

            <div class="timer-grid">
                <button class="timer-btn active" onclick="setTimer(1, this)">1m</button>
                <button class="timer-btn" onclick="setTimer(2, this)">2m</button>
                <button class="timer-btn" onclick="setTimer(3, this)">3m</button>
                <button class="timer-btn" onclick="setTimer(4, this)">4m</button>
                <button class="timer-btn" onclick="setTimer(5, this)">5m</button>
            </div>

            <div class="btn-grid">
                <button class="action-btn" onclick="guide('withdraw')">Withdraw টাকা তোলা</button>
                <button class="action-btn" onclick="guide('deposit')">ডিপোজিট গাইড</button>
                <button class="action-btn" style="grid-column: span 2; border-color: var(--gold); color: var(--gold);" onclick="guide('profit')">Daily Profit Management</button>
            </div>
            
            <button class="login-btn" onclick="getSignal()">GET REAL-TIME SIGNAL</button>
        </div>
    </div>

    <script>
        const secret = "Suman With 007@";
        let curLang = "bn-BD";
        let selectedTime = 1;

        function speak(text) {
            window.speechSynthesis.cancel();
            const s = new SpeechSynthesisUtterance(text);
            s.lang = curLang;
            s.rate = 1.0;
            window.speechSynthesis.speak(s);
        }

        function startApp() {
            const u = document.getElementById('uname').value;
            const tid = document.getElementById('trader-id').value;
            const p = document.getElementById('pass').value;
            curLang = document.getElementById('lang-select').value;

            if(p === secret && u && tid) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                let msg = curLang === "bn-BD" ? `নমস্কার ${u}, জীবটো এআই সিস্টেমে স্বাগতম। আইডি ${tid} ভেরিফাই হয়েছে। আমি সুমন ভাইয়ের হয়ে আপনাকে সাহায্য করবো।` : `Hello ${u}, welcome to Jibto AI. Your ID ${tid} is verified.`;
                speak(msg);
            } else { alert("সঠিক পাসওয়ার্ড দিন!"); }
        }

        function setTimer(t, btn) {
            selectedTime = t;
            document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            speak(curLang === "bn-BD" ? `${t} মিনিটের টাইম সেট করা হয়েছে।` : `${t} minute timer set.`);
        }

        function marketUpdate() {
            const m = document.getElementById('market-select').value;
            document.getElementById('m-display').innerText = "Market: " + m;
            speak(curLang === "bn-BD" ? `${m} মার্কেটটি জীবটো সিস্টেমে সেভ হয়েছে।` : `${m} market saved.`);
        }

        function getSignal() {
            const m = document.getElementById('market-select').value;
            if(!m) { speak(curLang === "bn-BD" ? "দয়া করে আগে একটি মার্কেট বেছে নিন।" : "Please select a market."); return; }
            
            const box = document.getElementById('signal-text');
            box.innerHTML = '<span style="color:var(--sky); font-size:14px; animation: blink 0.5s infinite;">SCANNING...</span>';
            speak(curLang === "bn-BD" ? "জীবটো এআই মার্কেট রহস্য এনালাইসিস করছে। ৫ সেকেন্ড অপেক্ষা করুন।" : "Jibto AI is analyzing market secrets. Wait 5 seconds.");

            setTimeout(() => {
                const res = Math.random() > 0.5 ? "UP ⬆️" : "DOWN ⬇️";
                box.innerHTML = res.includes("UP") ? `<span class="up">NEXT: ${res}</span>` : `<span class="down">NEXT: ${res}</span>`;
                
                if(curLang === "bn-BD") {
                    speak(`${selectedTime} মিনিটের জন্য পরবর্তী ক্যান্ডেল ${res.includes("UP") ? "উপরে" : "নিচে"} যাবে। সুমন ভাইয়ের স্ট্র্যাটেজি মেনে ট্রেড শুরু করুন।`);
                } else {
                    speak(`Next candle for ${selectedTime} minute will go ${res.includes("UP") ? "up" : "down"}. Follow Sumon's Strategy.`);
                }
            }, 5000);
        }

        function guide(type) {
            let msg = "";
            if(curLang === "bn-BD") {
                if(type==='withdraw') msg = "উইথড্র করার জন্য প্রোফাইল থেকে অপশন বেছে নিন। সুমন ভাই স্বচ্ছতায় বিশ্বাস করেন।";
                if(type==='profit') msg = "ডেইলি প্রফিট করতে হলে লোভ বর্জন করুন। ব্যালেন্সের মাত্র ২ শতাংশ রিস্ক নিন।";
                if(type==='deposit') msg = "সঠিক মেথড ব্যবহার করুন। জীবটো এআই আপনার পাশে আছে।";
            } else {
                if(type==='withdraw') msg = "Select withdraw option from profile. Sumon Bhai believes in transparency.";
                if(type==='profit') msg = "Avoid greed. Take only 2 percent risk. This is the main formula.";
                if(type==='deposit') msg = "Use verified methods for deposit.";
            }
            speak(msg);
        }

        function askJibto() {
            speak(curLang === "bn-BD" ? "আমি আপনার কথা শুনছি। বলুন সুমন ভাই আপনার জন্য কি সাহায্য করতে পারি?" : "I am listening. How can I help you?");
        }
    </script>
</body>
</html>
